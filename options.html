<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css" />
    <title>AnonPresent - Opciones</title>
  </head>
  <body>
    <div class="container">
      <h2>Opciones</h2>
      <section>
        <h4>Patrones globales</h4>
        <label>
          <input type="checkbox" id="patternPhone" /> Reemplazar números telefónicos
        </label>
        <br />
        <label>
          <input type="checkbox" id="patternEmail" /> Reemplazar emails
        </label>
      </section>

      <section>
        <h4>Método de anonimización</h4>
        <label><input type="radio" name="mode" value="replace" id="modeReplace" /> Reemplazar texto (ej: XXXXX)</label>
        <br />
        <label><input type="radio" name="mode" value="blur" id="modeBlur" /> Difuminar (blur)</label>
        <div id="blurOptions" style="margin-left:20px; display:none;">
          <label>Intensidad de blur (px): <input id="blurAmount" type="number" min="1" max="40" value="6" /></label>
        </div>

      </section>

      <section>
        <h4>Reemplazos</h4>
        <div>
          <label>Teléfono por: <input id="phoneReplacement" type="text" /></label>
        </div>
        <div>
          <label>Email por: <input id="emailReplacement" type="text" /></label>
        </div>
      </section>

      <section>
        <button id="saveBtn">Guardar</button>
        <button id="exportBtn">Exportar configuración</button>
      </section>

    </div>
    <script src="options.js"></script>
  </body>
</html>
